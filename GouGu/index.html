<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>趴不寄算距专用</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(56, 189, 248, 0.16), transparent 34%),
          linear-gradient(315deg, rgba(34, 197, 94, 0.14), transparent 36%),
          #f5f7fb;
      }

      main {
        width: min(100%, 440px);
        padding: 18px;
        border: 1px solid #d9e2ef;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 20px 50px rgba(23, 32, 51, 0.12);
      }

      .hero-image {
        width: 100%;
        aspect-ratio: 16 / 9;
        display: block;
        border-radius: 8px;
        object-fit: cover;
        object-position: center;
      }

      h1 {
        margin: 14px 0 20px;
        font-size: 22px;
        line-height: 1.2;
        text-align: center;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
      }

      label {
        font-size: 15px;
        font-weight: 700;
      }

      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid #b9c6d8;
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
        font-size: 18px;
        color: #172033;
        background: #ffffff;
      }

      input:focus {
        border-color: #0f766e;
        outline: 3px solid rgba(15, 118, 110, 0.18);
      }

      .result {
        min-height: 58px;
        margin-top: 22px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: #e8f7f4;
        color: #0f3f3a;
        font-size: 22px;
        font-weight: 700;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .result.is-muted {
        background: #eef2f7;
        color: #526173;
        font-size: 16px;
        font-weight: 500;
      }

      .result.is-error {
        background: #fff1f2;
        color: #9f1239;
        font-size: 16px;
        font-weight: 600;
      }

      @media (max-width: 420px) {
        body {
          padding: 16px;
        }

        main {
          padding: 14px;
        }

        h1 {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img class="hero-image" src="image/pubg.jpg" alt="趴不寄算距专用配图">
      <h1>趴不寄算距专用</h1>

      <div class="field">
        <label for="leg-a">第一条直角边</label>
        <input id="leg-a" inputmode="decimal" type="number" min="0" step="any" placeholder="单位为米">
        <!-- <input id="leg-a" inputmode="decimal" type="number" min="0" step="any"> -->

      </div>

      <div class="field">
        <label for="leg-b">第二条直角边</label>
        <input id="leg-b" inputmode="decimal" type="number" min="0" step="any" placeholder="单位为米">
        <!-- <input id="leg-b" inputmode="decimal" type="number" min="0" step="any"> -->
      </div>

      <div id="result" class="result is-muted" aria-live="polite">输入两条直角边后显示斜边距离</div>
    </main>

    <script>
      function calculateHypotenuse(legAValue, legBValue) {
        if (legAValue === "" || legBValue === "") {
          return null;
        }

        const legA = Number(legAValue);
        const legB = Number(legBValue);

        if (!Number.isFinite(legA) || !Number.isFinite(legB) || legA < 0 || legB < 0) {
          return null;
        }

        return Math.round(Math.hypot(legA, legB));
      }

      function updateResult() {
        const legAInput = document.getElementById("leg-a");
        const legBInput = document.getElementById("leg-b");
        const result = document.getElementById("result");
        const roundedHypotenuse = calculateHypotenuse(legAInput.value, legBInput.value);
        const hasEmptyInput = legAInput.value === "" || legBInput.value === "";

        result.classList.remove("is-muted", "is-error");

        if (hasEmptyInput) {
          result.textContent = "输入两条直角边后显示斜边长度";
          result.classList.add("is-muted");
          return;
        }

        if (roundedHypotenuse === null) {
          result.textContent = "请输入大于或等于 0 的数字";
          result.classList.add("is-error");
          return;
        }

        result.textContent = `距离：${roundedHypotenuse}米`;
      }

      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("leg-a").addEventListener("input", updateResult);
        document.getElementById("leg-b").addEventListener("input", updateResult);
      });
    </script>
  </body>
</html>
